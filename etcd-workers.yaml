version: "3.8"

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    container_name: etcd
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  nes:
    image: nebulastream/nes-development:local
    container_name: nes
    working_dir: ${PWD}
    volumes:
      - ${PWD}:${PWD}
    depends_on:
      etcd:
        condition: service_healthy
    environment:
      - NES_ETCD_ENDPOINTS=http://etcd:2379
    stdin_open: true
    tty: true
